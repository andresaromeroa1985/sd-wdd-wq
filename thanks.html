<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpotOn — Thank You</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',-apple-system,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px}
.wrap{text-align:center;max-width:480px}
.ico{width:64px;height:64px;border-radius:50%;background:#f0f5ff;border:1.5px solid rgba(23,105,255,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 28px}
.ico svg{width:28px;height:28px;stroke:#1769ff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:28px;font-weight:600;letter-spacing:-.02em;margin-bottom:12px}
p{font-size:15px;color:#a6b0bf;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <div class="ico"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h1>Questionnaire submitted!</h1>
  <p>Thanks — we'll confirm receipt within 2 business days and notify you when your site moves into the design queue.</p>
</div>
</body>
</html>
